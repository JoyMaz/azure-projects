name: Deploy Bicep to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run the workflow manually from GitHub

permissions:
  id-token: write  
  contents: read

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # This step takes your Bicep file and deploys it to Azure
      - name: Deploy Bicep File
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: "YourResourceGroupName" # Replace with your actual Resource Group name
          template: ./main.bicep
          failOnStdErr: false
